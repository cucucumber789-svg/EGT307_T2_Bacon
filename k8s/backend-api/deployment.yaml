apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  labels:
    app: backend-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
    spec:
      containers:
        - name: backend-api
          image: backend-api:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: backend-api-config
          # TODO: Add resource limits, readiness/liveness probes
